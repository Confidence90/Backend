name: baaralink
description: "BaaraLink — Marketplace Emploi & Services, Mali"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.4

  # HTTP
  dio: ^5.4.3

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Local storage
  shared_preferences: ^2.2.3

  # UI & Fonts
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  pinput: ^5.0.0

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  url_launcher: ^6.2.6

  # Connectivity
  connectivity_plus: ^6.0.3

  # Image
  image_picker: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
